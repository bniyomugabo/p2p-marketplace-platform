
<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A4D8C"/>
      <stop offset="50%" stop-color="#1E88C8"/>
      <stop offset="100%" stop-color="#6FD3E5"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0A4D8C" flood-opacity="0.2"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <!-- Left flowing strokes -->
    <path d="M40 220C120 120 180 120 260 200"
          stroke="url(#blueGradient)"
          stroke-width="16"
          stroke-linecap="round"
          fill="none"/>

    <path d="M55 255C140 165 210 165 285 235"
          stroke="url(#blueGradient)"
          stroke-width="14"
          stroke-linecap="round"
          opacity="0.95"
          fill="none"/>

    <path d="M70 290C155 210 225 210 300 270"
          stroke="url(#blueGradient)"
          stroke-width="12"
          stroke-linecap="round"
          opacity="0.9"
          fill="none"/>

    <!-- Central wave / M shape -->
    <path d="M250 220
             C310 80 360 80 410 210
             C450 300 500 300 545 210
             C590 120 650 120 730 190"
          stroke="url(#blueGradient)"
          stroke-width="24"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>

    <path d="M265 250
             C320 130 365 130 410 230
             C450 315 495 315 535 230
             C575 145 635 145 710 205"
          stroke="url(#blueGradient)"
          stroke-width="18"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.8"
          fill="none"/>

    <!-- Arrow element -->
    <path d="M470 210
             C515 205 550 220 575 250"
          stroke="url(#blueGradient)"
          stroke-width="16"
          stroke-linecap="round"
          fill="none"/>

    <path d="M560 230L605 245L575 280"
          fill="url(#blueGradient)"/>

    <!-- Right flowing strokes -->
    <path d="M520 160C620 70 700 75 760 120"
          stroke="url(#blueGradient)"
          stroke-width="16"
          stroke-linecap="round"
          opacity="0.95"
          fill="none"/>

    <path d="M535 195C630 110 705 115 755 150"
          stroke="url(#blueGradient)"
          stroke-width="13"
          stroke-linecap="round"
          opacity="0.85"
          fill="none"/>

    <path d="M550 230C640 150 710 155 750 185"
          stroke="url(#blueGradient)"
          stroke-width="10"
          stroke-linecap="round"
          opacity="0.75"
          fill="none"/>
  </g>
</svg>